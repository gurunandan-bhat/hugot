{{ define "main" }}
	<div class="container">
		<div class="row">
			<pre>Template: genres/term.html</pre>
			<div class="col-6">
				<h1>Articles related to Genre {{ .LinkTitle }}</h1>
				{{ range .RegularPages }}
					<h2 class="mt-5"><a href="{{ .RelPermalink }}">{{ .Title }}</a></h2>
					{{ .Summary }}
				{{ end }}
			</div>
		</div>
	</div>
{{ end }}
